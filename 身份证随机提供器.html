<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>身份证生成器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== iOS 系统级变量与重置 ===== */
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-bg: #F2F2F7;
            --ios-card: rgba(255, 255, 255, 0.7);
            --radius-main: 70px;
            --radius-inner: 45px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }
        
        body {
            background-color: #F2F2F7;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #000;
            overflow-x: hidden;
        }

        .app-container {
            width: 96%; 
            max-width: 1300px; 
            padding: 100px 30px;
            display: flex;
            flex-direction: column;
        }
        
        /* ===== iOS 风格页眉 ===== */
        .app-header {
            text-align: left;
            padding-left: 30px;
            margin-bottom: 80px;
        }
        
        .app-title {
            font-size: 110px; 
            font-weight: 800;
            letter-spacing: -4px;
            color: #1c1c1e;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #1c1c1e, #3a3a3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .app-subtitle {
            font-size: 42px;
            color: #8E8E93;
            font-weight: 500;
        }

        /* ===== 主内容区域 ===== */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            margin-bottom: 100px;
        }

        /* ===== 身份证显示卡片 ===== */
        .id-card-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 70px;
            padding: 80px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .id-card-container:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .id-card-title {
            font-size: 54px;
            font-weight: 800;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #1c1c1e, #007AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .id-info-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 45px;
            padding: 10px 0;
            margin-bottom: 60px;
        }

        .id-info-row {
            padding: 40px 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 30px;
        }

        .id-info-row:last-child {
            border-bottom: none;
        }

        .id-info-label {
            font-size: 38px;
            color: #8E8E93;
            font-weight: 500;
            min-width: 150px;
        }

        .id-info-value {
            font-size: 38px;
            color: #1c1c1e;
            font-weight: 700;
            cursor: pointer;
            user-select: all;
            position: relative;
            transition: all 0.2s;
        }

        .id-info-value:hover {
            color: #007AFF;
            transform: scale(1.02);
        }

        .id-info-value::after {
            content: '点击复制';
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .id-info-value:hover::after {
            opacity: 1;
        }

        /* ===== 按钮样式 ===== */
        .ios-btn-main {
            background: #007AFF;
            color: white;
            width: 100%;
            max-width: 500px;
            padding: 45px;
            border-radius: 40px;
            font-size: 42px;
            font-weight: 700;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            outline: none !important;
        }
        
        .ios-btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }
        
        .ios-btn-main:active { 
            transform: scale(0.98); 
            opacity: 0.9; 
        }

        /* ===== 历史记录区域 ===== */
        .history-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 70px;
            padding: 60px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            max-width: 800px;
        }

        .history-container:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .history-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, #1c1c1e, #007AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateX(8px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .history-name {
            font-size: 32px;
            font-weight: 700;
            color: #1c1c1e;
        }

        .history-id {
            font-size: 28px;
            color: #8E8E93;
            font-weight: 500;
        }

        .history-empty {
            text-align: center;
            font-size: 32px;
            color: #8E8E93;
            padding: 40px;
        }

        .clear-history-btn {
            background: #FF3B30;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 20px 35px;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 30px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            outline: none !important;
        }

        .clear-history-btn:hover {
            background: #E02D24;
            transform: translateY(-2px);
        }

        .clear-history-btn:active {
            transform: scale(0.98);
        }

        /* ===== 作者信息按钮 ===== */
        .author-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9998;
            outline: none !important;
            overflow: hidden;
        }

        .author-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .author-btn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 20px 45px rgba(0,0,0,0.2);
        }

        .author-btn:active {
            transform: scale(0.95);
        }

        /* ===== 作者信息弹窗 ===== */
        .author-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 9999;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .author-modal-overlay.active {
            display: flex;
        }

        .author-modal-content {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 600px;
            border-radius: 50px;
            padding: 60px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
            animation: appleModalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes appleModalIn {
            0% { 
                opacity: 0; 
                transform: scale(0.3); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        .author-modal-title {
            font-size: 50px;
            font-weight: 800;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #1c1c1e, #007AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .author-info-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 35px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .author-info-row {
            padding: 35px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .author-info-row:hover {
            background: rgba(0, 122, 255, 0.05);
        }

        .author-info-row:last-child {
            border-bottom: none;
        }

        .author-info-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 35px;
        }

        .author-info-icon.blue {
            background: linear-gradient(135deg, #007AFF, #5856D6);
        }

        .author-info-icon.green {
            background: linear-gradient(135deg, #34C759, #30D158);
        }

        .author-info-text {
            font-size: 32px;
            color: #1c1c1e;
            font-weight: 600;
        }

        .author-link {
            color: #007AFF;
            text-decoration: none;
            transition: all 0.15s;
        }

        .author-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .close-author-modal {
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 25px 50px;
            font-size: 32px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none !important;
        }

        .close-author-modal:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .close-author-modal:active {
            transform: scale(0.98);
        }

        /* ===== HUD 提示 (Apple Style) ===== */
        #toast {
            position: fixed;
            bottom: 150px;
            left: 50%;
            top: auto;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 50px 80px;
            border-radius: 50px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 10000;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            min-width: 500px;
            will-change: transform, opacity;
            outline: none !important;
        }
        
        #toast-icon { 
            font-size: 80px; 
            color: #34C759; 
            margin-bottom: 25px;
            animation: toastIconPulse 0.3s ease-out;
        }
        
        #toast-text { 
            font-size: 36px; 
            font-weight: 700; 
            text-align: center; 
            line-height: 1.4;
            color: #1c1c1e;
        }
        
        .show-toast { 
            display: flex !important; 
            animation: iosHudBottom 2.2s ease-in-out forwards; 
        }

        @keyframes toastIconPulse {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes iosHudBottom {
            0% { 
                opacity: 0; 
                transform: translateX(-50%) translateY(50px) scale(0.8); 
            }
            15% { 
                opacity: 1; 
                transform: translateX(-50%) translateY(0) scale(1); 
            }
            85% { 
                opacity: 1; 
                transform: translateX(-50%) translateY(0) scale(1); 
            }
            100% { 
                opacity: 0; 
                transform: translateX(-50%) translateY(20px) scale(0.9); 
            }
        }

        /* ===== iOS 底部大卡片 ===== */
        .app-footer {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 70px;
            padding: 80px 60px;
            border: 1px solid rgba(255,255,255,0.5);
            margin-top: 20px;
            margin-bottom: 100px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-footer:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .footer-title {
            font-size: 54px;
            font-weight: 800;
            margin-bottom: 60px;
            text-align: center;
        }

        .footer-highlight { color: #007AFF; }

        .footer-info-box {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 45px;
            padding: 10px 0;
            margin-bottom: 60px;
        }

        .info-row {
            padding: 40px 50px;
            display: flex;
            align-items: center;
            gap: 40px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .info-row:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .info-row:last-child { border-bottom: none; }

        .info-row i { 
            font-size: 45px; 
            color: #007AFF; 
            width: 60px; 
            text-align: center;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .info-row:hover i {
            transform: scale(1.1);
        }
        
        .info-row span { 
            font-size: 38px; 
            color: #1c1c1e; 
            font-weight: 500;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== 版权信息区域 ===== */
        .copyright-footer {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: 40px 50px;
            margin-top: 40px;
            margin-bottom: 60px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .copyright-footer:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .copyright-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .copyright-text {
            font-size: 32px;
            color: #8E8E93;
            font-weight: 500;
        }

        .copyright-text strong {
            color: #007AFF;
            font-weight: 700;
        }

        .official-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #007AFF, #5856D6);
            color: white;
            padding: 18px 35px;
            border-radius: 25px;
            font-size: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0, 122, 255, 0.25);
        }

        .official-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 122, 255, 0.35);
        }

        .official-link:active {
            transform: scale(0.98);
        }

        .official-link i {
            font-size: 28px;
        }

        /* ===== iOS 苹果风格弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 9999;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active { 
            opacity: 1; 
            visibility: visible; 
            pointer-events: auto;
            display: flex; 
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.92);
            width: 100%;
            max-width: 1000px;
            border-radius: 70px;
            padding: 70px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-height: 85vh;
            overflow-y: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
            transform: scale(0.5);
            opacity: 0;
        }
        
        .modal-overlay.active .modal-content {
            animation: appleModalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes appleModalIn {
            0% { 
                opacity: 0; 
                transform: scale(0.3);
            }
            100% { 
                opacity: 1; 
                transform: scale(1);
            }
        }

        .modal-header-title {
            font-size: 60px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #1c1c1e, #007AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ios-list {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 45px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .ios-list-item {
            padding: 50px;
            display: flex;
            align-items: center;
            gap: 45px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            outline: none !important;
        }
        
        .ios-list-item:hover {
            background: rgba(0, 122, 255, 0.05);
            transform: translateX(8px);
        }
        
        .ios-list-item:active { 
            background: rgba(0, 122, 255, 0.1);
            transform: translateX(4px);
        }
        
        .ios-list-item:last-child { border-bottom: none; }

        .list-icon {
            width: 110px; 
            height: 110px;
            border-radius: 28px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 55px; 
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .ios-list-item:hover .list-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .list-text-main { 
            font-size: 46px; 
            font-weight: 700; 
            margin-bottom: 8px;
            color: #1c1c1e;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .list-text-sub { 
            font-size: 32px; 
            color: #8E8E93;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .ios-list-item:hover .list-text-main {
            color: #007AFF;
        }

        .list-icon.dark-blue { background: linear-gradient(135deg, #7D7AFF, #5856D6); }
        .list-icon.blue { background: linear-gradient(135deg, #5AC8FA, #007AFF); }
        .list-icon.green { background: linear-gradient(135deg, #66D482, #34C759); }
        .list-icon.purple { background: linear-gradient(135deg, #BF5AF2, #AF52DE); }
        .list-icon.orange { background: linear-gradient(135deg, #FFB340, #FF9500); }

        /* ===== 响应式优化 ===== */
        @media (max-width: 768px) {
            .app-container {
                padding: 60px 20px;
            }
            
            .app-title {
                font-size: 80px;
                letter-spacing: -2px;
            }
            
            .app-subtitle {
                font-size: 32px;
            }

            .id-card-container,
            .history-container {
                padding: 50px 35px;
            }

            .id-card-title,
            .history-title {
                font-size: 42px;
                margin-bottom: 35px;
            }

            .id-info-row {
                padding: 25px 30px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .id-info-value {
                font-size: 30px;
            }

<body>

                <div class="list-icon dark-blue"><i class="fas fa-globe"></i></div>

    <div id="toast-text"></div>

<script>
    // 背景壁纸数组
    const wallpapers = [
        'https://img.cdn1.vip/i/69ee28d910b11_1777215705.webp',
        'https://img.cdn1.vip/i/69ee2942a96f1_1777215810.webp',
        'https://img.cdn1.vip/i/69ee2953b60a4_1777215827.webp',
        'https://img.cdn1.vip/i/69ee2957626c7_1777215831.webp'
    ];

    // 随机选择壁纸
    function setRandomWallpaper() {
        const randomIndex = Math.floor(Math.random() * wallpapers.length);
        const selectedWallpaper = wallpapers[randomIndex];
        document.body.style.setProperty('--bg-image', `url(${selectedWallpaper})`);
        document.body.style.backgroundImage = `url(${selectedWallpaper})`;
    }

    // 页面加载时随机设置壁纸
    setRandomWallpaper();

    // 身份证信息数据
    // 身份证数据数组（从文件加载）
    let idCardData = [];
    let dataLoaded = false;

    // 加载身份证数据文件
    async function loadIdCardData() {
        try {
            const response = await fetch('身份证＋姓名数据(10W条).txt');
            const arrayBuffer = await response.arrayBuffer();
            
            // 使用TextDecoder处理GBK编码
            const decoder = new TextDecoder('GBK');
            const text = decoder.decode(arrayBuffer);
            
            const lines = text.split('\n').filter(line => line.trim() !== '');
            
            idCardData = lines.map(line => {
                const parts = line.split('----');
                if (parts.length === 2) {
                    return {
                        name: parts[0].trim(),
                        id: parts[1].trim()
                    };
                }
                return null;
            }).filter(item => item !== null);
            
            dataLoaded = true;
            console.log(`成功加载 ${idCardData.length} 条身份证数据`);
        } catch (error) {
            console.error('加载数据失败:', error);
            // 如果加载失败，使用默认数据
            idCardData = [
                { name: "张三", id: "110101199001011234" },
                { name: "李四", id: "310101199102022345" },
                { name: "王五", id: "440101199203033456" },
                { name: "赵六", id: "330101199304044567" },
                { name: "钱七", id: "420101199405055678" },
                { name: "孙八", id: "120101199506066789" },
                { name: "周九", id: "510101199607077890" },
                { name: "吴十", id: "320101199708088901" },
                { name: "郑一", id: "370101199809099012" },
                { name: "王二", id: "410101199910100123" }
            ];
            dataLoaded = true;
        }
    }

    // 页面加载时自动加载数据
    document.addEventListener('DOMContentLoaded', loadIdCardData);

    // 历史记录
    let history = [];

    // 显示提示信息
    function showToast(message) {
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toast-text');
        
        toastText.textContent = message;
        toast.classList.add('show-toast');
        
        setTimeout(() => {
            toast.classList.remove('show-toast');
        }, 2200);
    }

    // 复制文本到剪贴板
    async function copyText(text, type) {
        if (!text || text.trim() === '') {
            showToast('请先获取身份证信息');
            return;
        }
        
        try {
            await navigator.clipboard.writeText(text.trim());
            showToast(`${type}已复制到剪贴板`);
        } catch (err) {
            // 降级方案：创建临时文本区域
            const textArea = document.createElement('textarea');
            textArea.value = text.trim();
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast(`${type}已复制到剪贴板`);
        }
    }

    // 点击标签复制姓名
    function copyNameByLabel() {
        const name = document.getElementById('nameDisplay').textContent;
        copyText(name, '姓名');
    }

    // 点击标签复制身份证号
    function copyIdByLabel() {
        const id = document.getElementById('idDisplay').textContent;
        copyText(id, '身份证号');
    }

    // 获取随机身份证信息
    async function getRandomId() {
        // 检查数据是否已加载
        if (!dataLoaded) {
            showToast('数据加载中，请稍候...');
            // 等待数据加载完成
            while (!dataLoaded) {
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }
        
        const randomIndex = Math.floor(Math.random() * idCardData.length);
        const randomIdCard = idCardData[randomIndex];
        
        document.getElementById('nameDisplay').textContent = randomIdCard.name;
        document.getElementById('idDisplay').textContent = randomIdCard.id;
        
        addToHistory(randomIdCard.name, randomIdCard.id);
        
        showToast('已获取随机身份证信息');
    }

    // 添加到历史记录
    function addToHistory(name, id) {
        history.unshift({ name, id, time: new Date().toLocaleString() });
        
        if (history.length > 20) {
            history.pop();
        }
        
        renderHistory();
    }

    // 渲染历史记录
    function renderHistory() {
        const historyList = document.getElementById('historyList');
        const clearBtn = document.getElementById('clearHistoryBtn');
        
        if (history.length === 0) {
            historyList.innerHTML = '<div class="history-empty">暂无历史记录</div>';
            clearBtn.style.display = 'none';
            return;
        }
        
        clearBtn.style.display = 'flex';
        
        historyList.innerHTML = history.map((item, index) => `
            <div class="history-item" onclick="copyHistoryItem('${item.name}', '${item.id}')">
                <span class="history-name">${item.name}</span>
                <span class="history-id">${item.id}</span>
            </div>
        `).join('');
    }

    // 复制历史记录项
    async function copyHistoryItem(name, id) {
        const text = `${name}\n${id}`;
        
        try {
            await navigator.clipboard.writeText(text);
            showToast('姓名和身份证号已复制');
        } catch (err) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast('姓名和身份证号已复制');
        }
    }

    // 清空历史记录
    function clearHistory() {
        history = [];
        renderHistory();
        showToast('已清空历史记录');
    }

    // 打开关于弹窗
    function openAboutModal(event) {
        if (event) {
            event.stopPropagation();
        }
        document.getElementById('aboutModal').classList.add('active');
    }

    // 关闭关于弹窗
    function closeAboutModal(event) {
        if (event && event.target === event.currentTarget) {
            document.getElementById('aboutModal').classList.remove('active');
        }
    }

    // 打开链接
    function go(url) {
        window.open(url, '_blank');
    }

    // 复制联系方式
    async function copyContact(type) {
        let text = '';
        let label = '';
        
        if (type === 'email') {
            text = 'Tsinhos@qq.com';
            label = '邮箱';
        } else if (type === 'qq') {
            text = '3496454360';
            label = 'QQ';
        }
        
        try {
            await navigator.clipboard.writeText(text);
            showToast(`${label}已复制到剪贴板`);
        } catch (err) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast(`${label}已复制到剪贴板`);
        }
    }
</script>
</body>

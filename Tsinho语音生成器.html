<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Tsinho语音生成器</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: rgba(255, 255, 255, 0.7);
            --text-primary: #1c1c1e;
            --text-secondary: #8E8E93;
            --text-tertiary: #a1a1a6;
            --radius-main: 70px;
            --radius-inner: 45px;
            --shadow-light: 0 8px 25px rgba(0,0,0,0.05);
            --shadow-medium: 0 15px 35px rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #F2F2F7;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 122, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(175, 82, 222, 0.08) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #000;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        .app-container {
            width: 96%;
            max-width: 1300px;
            padding: 80px 30px;
            display: flex;
            flex-direction: column;
        }

        /* 页眉 */
        .app-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .app-title {
            font-size: clamp(48px, 10vw, 110px);
            font-weight: 800;
            letter-spacing: -4px;
            color: #1c1c1e;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #1c1c1e, #3a3a3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-subtitle {
            font-size: clamp(20px, 4vw, 42px);
            color: #8E8E93;
            font-weight: 500;
        }

        /* 主卡片 */
        .main-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 70px;
            padding: 60px 50px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        /* 表单区块 */
        .form-section {
            margin-bottom: 50px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .form-label {
            font-size: clamp(24px, 4vw, 38px);
            font-weight: 700;
            color: #1c1c1e;
            margin-bottom: 25px;
            display: block;
        }

        /* 角色网格 */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .character-item {
            background: rgba(118, 118, 128, 0.12);
            border-radius: 45px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent;
        }

        .character-item:hover {
            background: rgba(118, 118, 128, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .character-item.selected {
            background: #007AFF;
            border-color: #0056b3;
            box-shadow: 0 15px 35px rgba(0, 122, 255, 0.3);
        }

        .character-item .name {
            font-size: clamp(18px, 3vw, 32px);
            font-weight: 600;
            color: #1c1c1e;
            display: block;
            margin-bottom: 8px;
        }

        .character-item.selected .name {
            color: white;
        }

        .character-item .category {
            font-size: clamp(14px, 2vw, 24px);
            color: #8E8E93;
        }

        .character-item.selected .category {
            color: rgba(255, 255, 255, 0.8);
        }

        /* 文本输入 */
        .text-input {
            width: 100%;
            min-height: 250px;
            padding: 35px 40px;
            background: rgba(118, 118, 128, 0.12);
            border: none;
            border-radius: 45px;
            font-size: clamp(20px, 3vw, 36px);
            line-height: 1.6;
            color: #000;
            resize: vertical;
            font-family: inherit;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .text-input::placeholder {
            color: #8E8E93;
        }

        .text-input:focus {
            background: rgba(118, 118, 128, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .char-count {
            text-align: right;
            font-size: clamp(16px, 2.5vw, 28px);
            color: #8E8E93;
            margin-top: 15px;
            padding-right: 20px;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }

        .btn {
            flex: 1;
            padding: 40px 50px;
            border-radius: 45px;
            font-size: clamp(20px, 3vw, 36px);
            font-weight: 700;
            cursor: pointer;
            border: none;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn svg {
            width: clamp(24px, 4vw, 40px);
            height: clamp(24px, 4vw, 40px);
        }

        .btn-primary {
            background: #007AFF;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px rgba(0, 122, 255, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(118, 118, 128, 0.12);
            color: #1c1c1e;
        }

        .btn-secondary:hover {
            background: rgba(118, 118, 128, 0.2);
            transform: translateY(-4px);
        }

        .btn-loading {
            position: relative;
            color: transparent;
            pointer-events: none;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 播放器卡片 */
        .player-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 70px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            margin-top: 40px;
            display: none;
        }

        .player-card.active {
            display: block;
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 35px;
        }

        .player-artwork {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #5AC8FA, #007AFF);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            flex-shrink: 0;
        }

        .player-meta h3 {
            font-size: clamp(24px, 4vw, 42px);
            font-weight: 700;
            margin-bottom: 10px;
            color: #1c1c1e;
        }

        .player-meta p {
            font-size: clamp(18px, 3vw, 30px);
            color: #8E8E93;
        }

        .audio-container {
            background: rgba(118, 118, 128, 0.12);
            border-radius: 35px;
            padding: 25px;
            margin-bottom: 30px;
        }

        audio {
            width: 100%;
            height: 60px;
        }

        .download-btn {
            width: 100%;
            padding: 35px;
            background: #34C759;
            color: white;
            border-radius: 35px;
            font-size: clamp(20px, 3vw, 36px);
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .download-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(52, 199, 89, 0.3);
        }

        .download-btn svg {
            width: clamp(24px, 4vw, 40px);
            height: clamp(24px, 4vw, 40px);
        }

        /* 错误提示 */
        .error-hint {
            background: rgba(255, 59, 48, 0.1);
            border-radius: 35px;
            padding: 25px 35px;
            display: none;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .error-hint.show {
            display: flex;
        }

        .error-hint svg {
            width: 32px;
            height: 32px;
            color: #FF3B30;
            flex-shrink: 0;
        }

        .error-hint span {
            font-size: clamp(18px, 3vw, 30px);
            color: #FF3B30;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            color: white;
            padding: 30px 50px;
            border-radius: 35px;
            font-size: clamp(18px, 3vw, 32px);
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .toast.error {
            background: rgba(255, 59, 48, 0.95);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .app-container {
                width: 100%;
                padding: 40px 20px;
            }

            .main-card {
                padding: 40px 30px;
                border-radius: 45px;
            }

            .character-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .character-item {
                padding: 20px 15px;
            }

            .button-group {
                flex-direction: column;
                gap: 20px;
            }

            .player-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 页眉 -->
        <div class="app-header">
            <h1 class="app-title">Tsinho语音生成器</h1>
            <p class="app-subtitle">选择角色，输入文本，即刻生成自然流畅的 AI 语音</p>
        </div>

        <!-- 主卡片 -->
        <div class="main-card">
            <!-- 角色选择 -->
            <div class="form-section">
                <label class="form-label">配音角色</label>
                <div class="character-grid" id="characterGrid"></div>
            </div>

            <!-- 文本输入 -->
            <div class="form-section">
                <label class="form-label">文本内容</label>
                <textarea class="text-input" id="textInput" placeholder="请输入要转换为语音的文本..." oninput="updateCharCount()"></textarea>
                <div class="char-count" id="charCount">0 字</div>
            </div>

            <!-- 操作按钮 -->
            <div class="button-group">
                <button class="btn btn-primary" id="generateBtn" onclick="generateVoice()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    生成语音
                </button>
                <button class="btn btn-secondary" onclick="clearAll()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    清空
                </button>
            </div>

            <!-- 错误提示 -->
            <div class="error-hint" id="errorHint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText"></span>
            </div>
        </div>

        <!-- 播放器卡片 -->
        <div class="player-card" id="playerCard">
            <div class="player-header">
                <div class="player-artwork">🎵</div>
                <div class="player-meta">
                    <h3 id="playerTitle">角色名称</h3>
                    <p id="playerSubtitle">生成完毕 · 点击播放</p>
                </div>
            </div>
            <div class="audio-container">
                <audio id="audioPlayer" controls></audio>
            </div>
            <a class="download-btn" id="downloadLink" href="#" download>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                下载音频
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastMsg"></span>
    </div>

    <script>
        // 角色数据
        const characters = [

            { name: "西安掌柜", category: "方言特色" },
            { name: "台湾男生", category: "方言特色" },
            { name: "台湾女生", category: "方言特色" },
            { name: "东北老铁", category: "方言特色" },
            { name: "重庆小伙", category: "方言特色" },

            { name: "康康舞曲", category: "歌唱类" },
            { name: "康定情歌", category: "歌唱类" }
        ];

        let currentSelection = null;
        const failedCharacters = new Set();

        // 初始化
        function init() {
            renderCharacterGrid();
        }

        // 渲染角色网格
        function renderCharacterGrid() {
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = '';

            characters.forEach(item => {
                const div = document.createElement('div');
                div.className = 'character-item';
                div.innerHTML = `
                    <span class="name">${item.name}</span>
                    <span class="category">${item.category}</span>
                `;
                div.onclick = () => selectCharacter(item, div);
                grid.appendChild(div);
            });
        }

        // 选择角色
        function selectCharacter(item, element) {
            if (failedCharacters.has(item.name)) {
                showToast(`"${item.name}" 暂时不可用`, true);
                return;
            }

            document.querySelectorAll('.character-item').forEach(el => {
                el.classList.remove('selected');
            });

            element.classList.add('selected');
            currentSelection = item;
            hideError();
            showToast(`已选择 "${item.name}"`);
        }

        // 更新字数
        function updateCharCount() {
            const len = document.getElementById('textInput').value.length;
            document.getElementById('charCount').textContent = `${len} 字`;
        }

        // 清空
        function clearAll() {
            document.getElementById('textInput').value = '';
            updateCharCount();
            hidePlayer();
            hideError();
            currentSelection = null;
            document.querySelectorAll('.character-item').forEach(el => {
                el.classList.remove('selected');
            });
            showToast('已清空');
        }

        // 隐藏播放器
        function hidePlayer() {
            document.getElementById('playerCard').classList.remove('active');
            const audio = document.getElementById('audioPlayer');
            audio.pause();
            audio.src = '';
        }

        // 显示错误
        function showError(msg) {
            const hint = document.getElementById('errorHint');
            document.getElementById('errorText').textContent = msg;
            hint.classList.add('show');
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('errorHint').classList.remove('show');
        }

        // 显示Toast
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.className = isError ? 'toast error show' : 'toast show';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 生成语音
        async function generateVoice() {
            const text = document.getElementById('textInput').value.trim();

            if (!currentSelection) {
                showError('请先选择一个配音角色');
                return;
            }

            if (!text) {
                showError('请输入要转换的文本内容');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.classList.add('btn-loading');
            btn.disabled = true;

            try {
                let apiUrl;
                
                if (currentSelection.api === 'mbAIsc') {
                    apiUrl = `https://api.milorapart.top/apis/mbAIsc?text=${encodeURIComponent(text)}`;
                } else {
                    apiUrl = `https://api.milorapart.top/apis/AIvoice/?text=${encodeURIComponent(text)}&speaker=${encodeURIComponent(currentSelection.name)}`;
                }
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);
                
                const response = await fetch(apiUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();

                if (data.code === 200 && data.url && data.url.trim() !== '') {
                    const audio = document.getElementById('audioPlayer');
                    audio.src = data.url;
                    document.getElementById('playerTitle').textContent = currentSelection.name;
                    document.getElementById('playerSubtitle').textContent = '生成完毕 · 点击播放';
                    document.getElementById('downloadLink').href = data.url;
                    document.getElementById('downloadLink').download = `voice_${currentSelection.name}_${Date.now()}.mp3`;
                    document.getElementById('playerCard').classList.add('active');

                    hideError();
                    showToast('语音生成成功！');
                } else if (data.code === 400 || data.code === 404 || data.msg) {
                    throw new Error(data.msg || '该角色暂时不可用');
                } else {
                    throw new Error('未返回有效的音频地址');
                }

            } catch (error) {
                if (currentSelection && error.message.includes('不可用')) {
                    failedCharacters.add(currentSelection.name);
                }
                showError(`生成失败: ${error.message}`);
                showToast('生成失败，请重试', true);
            } finally {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
